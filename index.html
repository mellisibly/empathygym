const S={ru:{tabs:["База","Тренажёры","Марафон"],tt:"Эмоциональная валидация",bk:"Назад",nx:"Далее",cn:"Продолжить",cd:"Пройдено",cm:"Готово",dy:"Дневник",d:"день",of:"из",dn:"Марафон пройден!",ey:"лёгкий",md:"средний",hd:"сложный",fr:"друзья",sl:"я",cl:"коллеги",pt:"партнёр",al:"все",cn2:"Концепция",ins:"Инструкция",cs2:"кейсов"},en:{tabs:["Theory","Trainers","Marathon"],tt:"Emotional Validation",bk:"Back",nx:"Next",cn:"Continue",cd:"Completed",cm:"Done",dy:"Diary",d:"day",of:"of",dn:"Marathon complete!",ey:"easy",md:"medium",hd:"hard",fr:"friends",sl:"self",cl:"colleagues",pt:"partner",al:"all",cn2:"Concept",ins:"Instructions",cs2:"cases"}};

const TH={ru:[{t:"Что такое эмоциональная валидация?",b:"**Эмоциональная валидация** — это признание и принятие чувств другого человека. Когда мы валидируем эмоции, мы говорим: «Я вижу, что тебе сейчас тяжело, и это нормально — так чувствовать».\n\nМы не пытаемся **исправить**, **обесценить** или **переключить** человека. Мы просто даём понять, что его чувства имеют значение."},{t:"Почему это важно?",b:"Когда человек чувствует, что его эмоции приняты, он быстрее успокаивается и чувствует себя **менее одиноким**.\n\nНа уровне нейробиологии: принятие вызывает **окситоцин** и снижает **кортизол**. А **обесценивание** мозг воспринимает почти как **физическую боль**."},{t:"Валидация в отношениях",b:"Валидация — **фундамент доверия**. **Джон Готтман** показал: пары, где партнёры отвечают на эмоциональные запросы с принятием, значительно более удовлетворены.\n\nОн называет это **«поворотом навстречу»** (turning toward).\n\nТакие пары лучше справляются с конфликтами и чувствуют более глубокую **эмоциональную связь**."},{t:"6 уровней валидации (Марша Линехан)",b:"1. **Присутствие** — слушать, не отвлекаясь.\n2. **Точное отражение** — пересказать своими словами.\n3. **Чтение между строк** — озвучить невысказанные чувства.\n4. **Понимание через историю** — «Учитывая то, что ты пережил, логично».\n5. **Нормализация** — «Любой на твоём месте чувствовал бы то же».\n6. **Радикальная искренность** — относиться как к равному."},{t:"Что НЕ является валидацией",b:"• **Советы без запроса:** «А ты попробуй…»\n• **Обесценивание:** «Не переживай», «Бывает и хуже»\n• **Переключение на себя:** «У меня тоже так было…»\n• **Токсичный позитив:** «Зато у тебя всё остальное хорошо!»\n• **Логические аргументы:** «Но ведь объективно…»\n• **Обвинение:** «Ну ты сам виноват»"},{t:"Но разве не лучше помочь советом?",b:"**Совет до валидации = отвержение.** «А ты попробуй…» считывается как «твои чувства неважны».\n\n**Совет создаёт зависимость.** Валидация помогает **опираться на себя**.\n\n**Совет — ваше решение, не его.** Только он эксперт в своей жизни.\n\nЧто делать? **Валидировать**. Потом спросить: «Тебе нужна помощь или просто поддержка?»"},{t:"Загадки общения",b:"**«Она не хочет решения — хочет быть услышанной»**\nРефлекс «починить» говорит: «твоё чувство — помеха».\n\n**«Я хотел поддержать — стало хуже»**\n«Не переживай» — **инвалидация**.\n\n**«Мы согласны — но ссоримся»**\nНастоящая боль — «**меня не слышат**».\n\n**«Почему я строг к себе?»**\nВнутренний критик — **усвоенный голос**. **Самовалидация** — навык.\n\n**«Признать чувства = согласиться?»**\nНет. Валидация — про **признание опыта**."},{t:"Как практиковать",b:"1. **Пауза** перед ответом.\n2. **«Что этот человек чувствует?»**\n3. **Назовите:** «Похоже, тебе обидно.»\n4. **Примите:** «Это понятно.»\n5. **Спросите, как помочь** — вместо решений.\n\nВ **«Тренажёрах»** потренируетесь, а в **«Марафоне»** — каждый день в жизни."}],en:[{t:"What is emotional validation?",b:"**Emotional validation** is acknowledging and accepting another person's feelings. We say: \"I see you're having a hard time, and it's okay to feel that way.\"\n\nWe don't try to **fix**, **dismiss**, or **redirect**. We let them know their feelings matter."},{t:"Why does it matter?",b:"When emotions are accepted, a person calms down faster and feels **less alone**.\n\nNeurobiologically: acceptance triggers **oxytocin** and lowers **cortisol**. **Invalidation** is processed almost like **physical pain**."},{t:"Validation in relationships",b:"Validation is the **foundation of trust**. **John Gottman** showed: couples who respond to emotional bids with acceptance are significantly more satisfied.\n\nHe calls this **\"turning toward\"**.\n\nSuch couples handle conflicts better and feel deeper **emotional connection**."},{t:"6 Levels of Validation (Marsha Linehan)",b:"1. **Being present** — listening without distractions.\n2. **Accurate reflection** — paraphrasing.\n3. **Reading between the lines** — naming unspoken feelings.\n4. **Understanding through history** — \"Given what you've been through, it makes sense.\"\n5. **Normalizing** — \"Anyone would feel the same.\"\n6. **Radical genuineness** — treating as an equal."},{t:"What is NOT validation",b:"• **Unsolicited advice:** \"You should try…\"\n• **Dismissing:** \"Don't worry\", \"Could be worse\"\n• **Making it about yourself:** \"Same happened to me…\"\n• **Toxic positivity:** \"At least everything else is great!\"\n• **Logical arguments:** \"But objectively…\"\n• **Blaming:** \"It's your own fault\""},{t:"Isn't advice better?",b:"**Advice before validation = rejection.** \"You should try…\" = \"your feelings don't matter.\"\n\n**Advice creates dependency.** Validation helps them **rely on themselves**.\n\n**Advice is your solution, not theirs.**\n\nInstead: **validate first**, then ask: \"Do you need help or just support?\""},{t:"Communication puzzles",b:"**\"She doesn't want a solution — she wants to be heard\"**\nThe fix-it reflex says: \"your feeling is an obstacle.\"\n\n**\"I tried to help — made it worse\"**\n\"Don't worry\" is **invalidation**.\n\n**\"We agree — but we're fighting\"**\nThe real pain: \"**I'm not being heard**.\"\n\n**\"Why am I so hard on myself?\"**\nThe inner critic is a **learned voice**. **Self-validation** is learnable.\n\n**\"Acknowledge feelings = agree?\"**\nNo. Validation is about **acknowledging experience**."},{t:"How to practice",b:"1. **Pause** before responding.\n2. **\"What is this person feeling?\"**\n3. **Name it:** \"It sounds like you're hurt.\"\n4. **Accept:** \"That makes sense.\"\n5. **Ask how to help** — don't offer solutions.\n\nIn **\"Trainers\"** you'll practice, and in **\"Marathon\"** — every day in real life."}]};
const MD={ru:[{d:1,df:"ey",cx:"fr",tk:"Когда кто-то пожалуется — скажи одно предложение без совета. Просто назови чувство.",q1:"Получилось сдержать совет?",q2:"Что сказал вместо него?"},{d:2,df:"ey",cx:"sl",tk:"Вспомни разговор где тебе было плохо. Что хотел услышать — но не услышал?",q1:"Какая валидация была бы точной?",q2:"Легко ли было сформулировать?"},{d:3,df:"ey",cx:"cl",tk:"Дай человеку договорить до конца. Не заканчивай его мысль.",q1:"Было желание перебить?",q2:"В какой момент?"},{d:4,df:"ey",cx:"pt",tk:"Когда партнёр расскажет о дне — не комментируй. Задай один уточняющий вопрос.",q1:"Какой вопрос задал?",q2:"Как отреагировал?"},{d:5,df:"ey",cx:"fr",tk:"Напиши другу — просто спроси «как ты?». Без повода.",q1:"Что ответил?",q2:"Легко или неловко?"},{d:6,df:"ey",cx:"sl",tk:"Замечай когда хочешь сказать себе «не переживай». Вместо: «Мне тяжело — и это нормально».",q1:"Удалось заметить?",q2:"Что чувствовал после?"},{d:7,df:"ey",cx:"cl",tk:"Когда коллега жалуется — скажи «это реально тяжело» вместо совета.",q1:"Как отреагировал?",q2:"Было ли желание посоветовать?"},{d:8,df:"ey",cx:"al",tk:"Назови вслух чувство собеседника. Хотя бы раз.",q1:"Какое чувство?",q2:"Угадал?"},{d:9,df:"ey",cx:"sl",tk:"Вечером назови одно чувство за день. Без оценки.",q1:"Какое чувство?",q2:"Было ожидаемым?"},{d:10,df:"md",cx:"fr",tk:"Перескажи слова друга: «Правильно ли я понимаю, что ты чувствуешь...?»",q1:"Удалось точно?",q2:"Что ответил?"},{d:11,df:"md",cx:"pt",tk:"Когда партнёр расстроен — не поднимай настроение. Просто: «Я рядом».",q1:"Как отреагировал?",q2:"Было некомфортно молчать?"},{d:12,df:"md",cx:"sl",tk:"Переформулируй: «Я сделал ошибку» вместо «Я идиот».",q1:"Удалось?",q2:"Как звучала новая фраза?"},{d:13,df:"md",cx:"cl",tk:"Замечай обесценивание от других. Просто заметь.",q1:"Заметил?",q2:"Что было сказано?"},{d:14,df:"md",cx:"fr",tk:"Уровень 3: назови чувство, которое человек не назвал сам.",q1:"Какое?",q2:"Попал?"},{d:15,df:"md",cx:"al",tk:"Валидируй. Потом спроси: «Помощь с решением или поддержка?»",q1:"Что ответил?",q2:"Удивил ответ?"},{d:16,df:"md",cx:"sl",tk:"Напиши себе валидацию — как другу.",q1:"Что написал?",q2:"Как себя почувствовал?"},{d:17,df:"md",cx:"pt",tk:"Не решай проблему партнёра. Просто: «Это звучит тяжело».",q1:"Удалось не решать?",q2:"Как отреагировал?"},{d:18,df:"md",cx:"cl",tk:"Попробуй: «Любой на твоём месте чувствовал бы то же».",q1:"Как отреагировал?",q2:"Было уместно?"},{d:19,df:"hd",cx:"fr",tk:"Друг злится — не защищай другого. Назови злость.",q1:"Удалось?",q2:"Что было сложным?"},{d:20,df:"hd",cx:"sl",tk:"Замечай «двойной удар» — злость на злость. Назови второй слой.",q1:"Какой был?",q2:"Удалось отделить?"},{d:21,df:"hd",cx:"pt",tk:"При разногласии: «Я слышу тебя» прежде позиции.",q1:"Сказал?",q2:"Как изменился разговор?"},{d:22,df:"hd",cx:"cl",tk:"Когда коллега скажет «неудобное» — не меняй тему. Задай вопрос.",q1:"Что рассказал?",q2:"Что почувствовал?"},{d:23,df:"hd",cx:"sl",tk:"Назови три чувства за день. Без оценки.",q1:"Какие три?",q2:"Какое неожиданное?"},{d:24,df:"hd",cx:"fr",tk:"Замечай переключение на себя. Оставайся в его истории.",q1:"Удалось?",q2:"Что хотел рассказать?"},{d:25,df:"hd",cx:"al",tk:"«Эхо с удивлением»: «Подожди — серьёзно три раза подряд?»",q1:"Как отреагировал?",q2:"Как звучало?"},{d:26,df:"hd",cx:"sl",tk:"«Не должен так чувствовать» → «Я чувствую это — и это настоящее».",q1:"Какое чувство «запрещённое»?",q2:"Удалось принять?"},{d:27,df:"hd",cx:"pt",tk:"«Не знаю почему плохо» — не ищи причину. Плохо без причины — тоже плохо.",q1:"Как отреагировал?",q2:"Изменился разговор?"},{d:28,df:"hd",cx:"fr",tk:"Напиши другу которого давно не слышал. Просто спроси как он.",q1:"Что рассказал?",q2:"Когда последний раз слушал?"},{d:29,df:"hd",cx:"sl",tk:"В больном разговоре — назови чувство прямо.",q1:"Удалось?",q2:"Что изменилось?"},{d:30,df:"hd",cx:"al",tk:"Вспомни разговор где валидация получилась. Почему сработало?",q1:"Что изменилось в тебе?",q2:"Одним предложением."}],en:[{d:1,df:"ey",cx:"fr",tk:"When someone complains — say one sentence without advice. Name the feeling.",q1:"Did you hold back advice?",q2:"What did you say?"},{d:2,df:"ey",cx:"sl",tk:"Recall a bad conversation. What did you want to hear?",q1:"What validation would fit?",q2:"Was it easy to word?"},{d:3,df:"ey",cx:"cl",tk:"Let the person finish. Don't complete their thought.",q1:"Urge to interrupt?",q2:"At what moment?"},{d:4,df:"ey",cx:"pt",tk:"When your partner talks — don't comment. Ask one question.",q1:"What question?",q2:"How did they react?"},{d:5,df:"ey",cx:"fr",tk:"Text a friend — just ask 'how are you?'",q1:"What did they say?",q2:"Easy or awkward?"},{d:6,df:"ey",cx:"sl",tk:"Notice 'don't worry' self-talk. Replace: 'I'm having a hard time — that's okay.'",q1:"Did you notice?",q2:"What did you feel?"},{d:7,df:"ey",cx:"cl",tk:"Say 'that's really tough' instead of advice.",q1:"How did they react?",q2:"Still want to advise?"},{d:8,df:"ey",cx:"al",tk:"Name their feeling out loud. At least once.",q1:"What feeling?",q2:"Were you right?"},{d:9,df:"ey",cx:"sl",tk:"Name one feeling from today. No judgment.",q1:"What feeling?",q2:"Expected?"},{d:10,df:"md",cx:"fr",tk:"Retell their words: 'Am I right that you feel...?'",q1:"Accurate?",q2:"What did they say?"},{d:11,df:"md",cx:"pt",tk:"Don't cheer them up. Just: 'I'm here.'",q1:"How did they react?",q2:"Uncomfortable?"},{d:12,df:"md",cx:"sl",tk:"'I made a mistake' instead of 'I'm an idiot.'",q1:"Did you stop?",q2:"How did it sound?"},{d:13,df:"md",cx:"cl",tk:"Notice invalidation from others. Just notice.",q1:"Did you notice?",q2:"What was said?"},{d:14,df:"md",cx:"fr",tk:"Level 3: name a feeling they didn't name.",q1:"What feeling?",q2:"Were you right?"},{d:15,df:"md",cx:"al",tk:"Validate first. Then: 'Help with solution or just support?'",q1:"What did they answer?",q2:"Surprised?"},{d:16,df:"md",cx:"sl",tk:"Write yourself a validation message.",q1:"What did you write?",q2:"How did it feel?"},{d:17,df:"md",cx:"pt",tk:"Don't solve it. Just: 'That sounds tough.'",q1:"Did you manage?",q2:"How did they react?"},{d:18,df:"md",cx:"cl",tk:"Try: 'Anyone in your place would feel the same.'",q1:"How did they react?",q2:"Appropriate?"},{d:19,df:"hd",cx:"fr",tk:"Don't defend the other person. Just name the anger.",q1:"Did you manage?",q2:"Hardest part?"},{d:20,df:"hd",cx:"sl",tk:"'Double blow' — angry at being angry. Name the second layer.",q1:"What was it?",q2:"Did you separate?"},{d:21,df:"hd",cx:"pt",tk:"'I hear you' before explaining your position.",q1:"Did you say it?",q2:"How did it change?"},{d:22,df:"hd",cx:"cl",tk:"Don't change the subject. Ask a question.",q1:"What did they share?",q2:"What did you feel?"},{d:23,df:"hd",cx:"sl",tk:"Name three feelings. No good or bad.",q1:"Which three?",q2:"Most unexpected?"},{d:24,df:"hd",cx:"fr",tk:"Notice redirecting to yourself. Stay in their story.",q1:"Did you stay?",q2:"What did you want to share?"},{d:25,df:"hd",cx:"al",tk:"'Echo with surprise': 'Wait — seriously, three times?'",q1:"How did they react?",q2:"How did it sound?"},{d:26,df:"hd",cx:"sl",tk:"'I shouldn't feel this' → 'I feel this — and it's real.'",q1:"What feeling was forbidden?",q2:"Did you accept?"},{d:27,df:"hd",cx:"pt",tk:"'Don't know why I feel bad' — don't look for a reason.",q1:"How did they react?",q2:"Did it change?"},{d:28,df:"hd",cx:"fr",tk:"Call a friend you haven't listened to. Just ask how they are.",q1:"What did they share?",q2:"When did you last listen?"},{d:29,df:"hd",cx:"sl",tk:"Name what you feel right in the conversation.",q1:"Did you manage?",q2:"What changed?"},{d:30,df:"hd",cx:"al",tk:"Recall a conversation where validation worked. Why?",q1:"What changed in you?",q2:"In one sentence."}]};
