const TH={
ru:[
{t:"Что такое эмоциональная валидация?",i:"💡",b:"**Эмоциональная валидация** — это признание и принятие чувств другого человека. Когда мы валидируем эмоции, мы говорим: «Я вижу, что тебе сейчас тяжело, и это нормально — так чувствовать».\n\nМы не пытаемся **исправить**, **обесценить** или **переключить** человека. Мы просто даём понять, что его чувства имеют значение."},
{t:"Почему это важно?",i:"🧠",b:"Когда человек чувствует, что его эмоции приняты, он быстрее успокаивается, больше доверяет собеседнику и чувствует себя **менее одиноким**.\n\nНа уровне нейробиологии: когда наши эмоции принимают, выделяется **окситоцин** и снижается **кортизол**. А **обесценивание** мозг воспринимает как отвержение — почти так же, как **физическую боль**."},
{t:"Валидация в отношениях",i:"❤️",b:"В близких отношениях валидация — это **фундамент доверия**. Психолог **Джон Готтман** показал: пары, где партнёры отвечают на эмоциональные запросы друг друга с принятием, значительно более удовлетворены отношениями.\n\nГоттман называет это **«поворотом навстречу»** (turning toward).\n\nПары, которые практикуют валидацию, лучше справляются с конфликтами и чувствуют более глубокую **эмоциональную связь**."},
{t:"6 уровней валидации (по Марше Линехан)",i:"📊",b:"1. **Присутствие** — быть рядом, слушать, не отвлекаясь.\n2. **Точное отражение** — пересказать своими словами.\n3. **Чтение между строк** — озвучить невысказанные чувства.\n4. **Понимание через историю** — «Учитывая то, что ты пережил, логично, что ты так себя чувствуешь».\n5. **Нормализация** — «Любой на твоём месте чувствовал бы то же самое».\n6. **Радикальная искренность** — относиться как к равному, без жалости."},
{t:"Что НЕ является валидацией",i:"🚫",b:"• **Советы без запроса:** «А ты попробуй…»\n• **Обесценивание:** «Да ладно, не переживай», «Бывает и хуже»\n• **Переключение на себя:** «У меня тоже так было…»\n• **Токсичный позитив:** «Зато у тебя всё остальное хорошо!»\n• **Логические аргументы:** «Но ведь объективно…»\n• **Обвинение:** «Ну ты сам виноват»"},
{t:"Но разве не лучше помочь советом?",i:"❓",b:"**Совет до валидации воспринимается как отвержение.** Когда человек делится переживанием, а в ответ слышит «а ты попробуй…» — он считывает: «твои чувства неважны».\n\n**Совет создаёт зависимость, а не опору.** Валидация помогает **опираться на себя**.\n\n**Совет — это ваше решение, не его.** Только он сам — эксперт в своей жизни.\n\nЧто делать? Сначала — **валидировать**. Потом спросить: «Тебе нужна помощь с решением или просто поддержка?»"},
{t:"Загадки общения",i:"🧩",b:"**«Она не хочет решения — она хочет быть услышанной»**\nРефлекс «починить» несёт скрытое послание: «твоё чувство — помеха».\n\n**«Я хотел поддержать — а стало хуже»**\n«Не переживай». «Всё будет хорошо». Каждая из этих фраз — **инвалидация**.\n\n**«Мы согласны — но всё равно ссоримся»**\nНастоящая боль — «**меня не слышат**».\n\n**«Почему я так строг к себе?»**\nВнутренний критик — **усвоенный голос**. **Самовалидация** — навык, который можно освоить.\n\n**«Если я признаю чувства — значит я согласен?»**\nНет. Валидация — не про правоту. Это про **признание опыта**."},
{t:"Как практиковать",i:"🧘",b:"1. **Пауза** перед ответом.\n2. Спросите себя: **«Что этот человек чувствует?»**\n3. **Назовите чувство:** «Похоже, тебе обидно.»\n4. **Примите безусловно:** «Это понятно.»\n5. **Спросите, как помочь** — вместо решений.\n\nВ **«Тренажёрах»** потренируетесь, а в **«Марафоне»** — в реальной жизни каждый день."}
],
en:[
{t:"What is emotional validation?",i:"💡",b:"**Emotional validation** is acknowledging and accepting another person's feelings. We say: \"I see that you're having a hard time, and it's okay to feel that way.\"\n\nWe don't try to **fix**, **dismiss**, or **redirect**. We let them know their feelings matter."},
{t:"Why does it matter?",i:"🧠",b:"When emotions are accepted, a person calms down faster, trusts more, and feels **less alone**.\n\nNeurobiologically: acceptance triggers **oxytocin** and lowers **cortisol**. **Invalidation** is processed by the brain almost like **physical pain**."},
{t:"Validation in relationships",i:"❤️",b:"Validation is the **foundation of trust**. **John Gottman's** research showed: couples who respond to emotional bids with acceptance are significantly more satisfied.\n\nGottman calls this **\"turning toward\"**.\n\nCouples who practice validation handle conflicts better and feel deeper **emotional connection**."},
{t:"6 Levels of Validation (Marsha Linehan)",i:"📊",b:"1. **Being present** — listening without distractions.\n2. **Accurate reflection** — paraphrasing.\n3. **Reading between the lines** — naming unspoken feelings.\n4. **Understanding through history** — \"Given what you've been through, it makes sense.\"\n5. **Normalizing** — \"Anyone would feel the same.\"\n6. **Radical genuineness** — treating as an equal."},
{t:"What is NOT validation",i:"🚫",b:"• **Unsolicited advice:** \"You should try…\"\n• **Dismissing:** \"Don't worry\", \"Could be worse\"\n• **Making it about yourself:** \"Same happened to me…\"\n• **Toxic positivity:** \"At least everything else is great!\"\n• **Logical arguments:** \"But objectively…\"\n• **Blaming:** \"It's your own fault\""},
{t:"Isn't it better to just give advice?",i:"❓",b:"**Advice before validation feels like rejection.** \"You should try…\" = \"your feelings don't matter.\"\n\n**Advice creates dependency.** Validation helps them **rely on themselves**.\n\n**Advice is your solution, not theirs.**\n\nInstead: **validate first**, then ask: \"Do you need help with a solution, or just support?\""},
{t:"Communication puzzles",i:"🧩",b:"**\"She doesn't want a solution — she wants to be heard\"**\nThe fix-it reflex says: \"your feeling is an obstacle.\"\n\n**\"I tried to help — and made it worse\"**\n\"Don't worry.\" \"It'll be fine.\" Each is **invalidation**.\n\n**\"We agree — but we're still fighting\"**\nThe real pain: \"**I'm not being heard**.\"\n\n**\"Why am I so hard on myself?\"**\nThe inner critic is a **learned voice**. **Self-validation** is learnable.\n\n**\"If I acknowledge feelings — do I agree?\"**\nNo. Validation is about **acknowledging experience**."},
{t:"How to practice",i:"🧘",b:"1. **Pause** before responding.\n2. Ask: **\"What is this person feeling?\"**\n3. **Name it:** \"It sounds like you're hurt.\"\n4. **Accept:** \"That makes sense.\"\n5. **Ask how to help** — don't offer solutions.\n\nIn **\"Trainers\"** you'll practice, and in **\"Marathon\"** — every day in real life."}
]};

en:[
{d:1,df:"ey",cx:"fr",tk:"When someone complains today — say one sentence without advice. Just name the feeling.",q1:"Did you hold back advice?",q2:"What did you say instead?"},
{d:2,df:"ey",cx:"sl",tk:"Recall a conversation where you felt bad. What did you want to hear?",q1:"What validation would have been accurate?",q2:"Was it easy to put into words?"},
{d:3,df:"ey",cx:"cl",tk:"In a conversation today — let the person finish. Don't complete their thought.",q1:"Did you feel the urge to interrupt?",q2:"At what moment?"},
{d:4,df:"ey",cx:"pt",tk:"When your partner talks about their day — don't comment. Ask one clarifying question.",q1:"What question did you ask?",q2:"How did they react?"},
{d:5,df:"ey",cx:"fr",tk:"Text a friend — just ask 'how are you?' No reason needed.",q1:"What did they say?",q2:"Was it easy or awkward?"},
{d:6,df:"ey",cx:"sl",tk:"Notice when you want to say 'don't worry.' Instead: 'I'm having a hard time — and that's okay.'",q1:"Did you notice?",q2:"What did you feel after?"},
{d:7,df:"ey",cx:"cl",tk:"When a colleague complains — say 'that's really tough' instead of giving advice.",q1:"How did they react?",q2:"Did you still want to advise?"},
{d:8,df:"ey",cx:"al",tk:"In any conversation — name their feeling out loud. At least once.",q1:"What feeling did you name?",q2:"Were you right?"},
{d:9,df:"ey",cx:"sl",tk:"Tonight, recall one emotional moment. Name the feeling. No judgment.",q1:"What was the feeling?",q2:"Was it expected?"},
{d:10,df:"md",cx:"fr",tk:"When a friend complains — retell their words. 'Am I right that you feel...?'",q1:"Did you retell accurately?",q2:"What did they say?"},
{d:11,df:"md",cx:"pt",tk:"When your partner is upset — don't cheer them up. Just: 'I'm here.'",q1:"How did they react?",q2:"Was it uncomfortable to be silent?"},
{d:12,df:"md",cx:"sl",tk:"When you criticize yourself — rephrase: 'I made a mistake' instead of 'I'm an idiot.'",q1:"Did you stop the criticism?",q2:"How did the new sentence sound?"},
{d:13,df:"md",cx:"cl",tk:"Notice invalidation from others. 'Don't worry', 'could be worse' — just notice.",q1:"Did you notice invalidation?",q2:"What was said?"},
{d:14,df:"md",cx:"fr",tk:"Try level 3: name a feeling they didn't name themselves.",q1:"What feeling did you name?",q2:"Were you right?"},
{d:15,df:"md",cx:"al",tk:"Validate first. Then ask: 'Do you need help with a solution or just support?'",q1:"What did they answer?",q2:"Did it surprise you?"},
{d:16,df:"md",cx:"sl",tk:"Write yourself a validation message — as if to a friend.",q1:"What did you write?",q2:"How did it feel?"},
{d:17,df:"md",cx:"pt",tk:"When your partner shares a problem — don't solve it. Just: 'That sounds tough.'",q1:"Did you manage not to solve it?",q2:"How did they react?"},
{d:18,df:"md",cx:"cl",tk:"Try normalizing: 'Anyone in your place would feel the same.'",q1:"How did they react?",q2:"Did it feel appropriate?"},
{d:19,df:"hd",cx:"fr",tk:"When a friend is angry at someone — don't defend the other person. Just name the anger.",q1:"Did you manage not to defend?",q2:"What was hardest?"},
{d:20,df:"hd",cx:"sl",tk:"Notice the 'double blow' — angry at yourself for being angry. Name the second layer.",q1:"What was the second layer?",q2:"Did you separate it?"},
